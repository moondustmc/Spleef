config-version: 3

settings:
  min-players: 2
  countdown-seconds: 15
  restart-delay-seconds: 8
  snow-block: SNOW_BLOCK
  death-trigger-block: WATER
  require-shovel: true
  afk-kick-seconds: 45
  participation-coins: 5
  win-coins: 25
  map-rotation-seconds: 1800
  first-join-spawn: true
  cosmetics-menu-item:
    enabled: true
    slot: 8
    material: CHEST
    name: "&bCosmetics"
  online-reward:
    enabled: true
    seconds: 600
    coins: 2
  must-mine:
    enabled: true
    intervals:
      - after-seconds: 90
        break-every-seconds: 15
      - after-seconds: 150
        break-every-seconds: 10
      - after-seconds: 210
        break-every-seconds: 6

coin-multipliers:
  global: 1.0
  permissions:
    vip: 1.25
    premium: 1.5

scoreboard:
  enabled: true
  title: "&b&lSpleef"
  lines:
    - "&7Global coin multiplier: &f{global_multiplier}x"
    - "&7Your total multiplier: &f{total_multiplier}x"
    - "&7Wins: &f{wins}"
    - "&7Win streak: &f{streak}"
    - "&7Coins: &f{coins}"

